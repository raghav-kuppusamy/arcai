<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0071E3" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#0058B3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34AADC" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="ag" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5AC8FA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0071E3" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="url(#mg)" stroke-width="0.5" opacity="0.15"/>

  <!-- Main arc -->
  <path d="M 30 60 A 30 30 0 1 1 90 60" fill="none" stroke="url(#mg)" stroke-width="12" stroke-linecap="round"/>

  <!-- Progress indicator arcs -->
  <path d="M 35 60 A 25 25 0 0 1 60 35" fill="none" stroke="url(#ag)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M 60 85 A 25 25 0 0 1 85 60" fill="none" stroke="url(#ag)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Intelligence nodes -->
  <circle cx="30" cy="60" r="6" fill="url(#mg)"/>
  <circle cx="90" cy="60" r="6" fill="url(#mg)"/>
  <circle cx="60" cy="30" r="4" fill="url(#ag)" opacity="0.9"/>

  <!-- Center element -->
  <circle cx="60" cy="60" r="8" fill="url(#mg)"/>

  <!-- Inner ring -->
  <circle cx="60" cy="60" r="4" fill="white" opacity="0.3"/>
</svg>
